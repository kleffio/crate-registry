name: Build crate images

on:
  push:
    branches: [main]
    paths:
      - 'games/**/Dockerfile'
      - 'databases/**/Dockerfile'
      - 'cache/**/Dockerfile'
      - 'storage/**/Dockerfile'
      - 'web/**/Dockerfile'
      - 'apps/**/Dockerfile'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: set-matrix
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD | grep 'Dockerfile' | grep -v '^images/')
          matrix=$(echo "$changed" | python3 .github/scripts/dockerfiles_to_matrix.py)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
