name: Build runtime images

on:
  push:
    branches: [main]
    paths:
      - 'constructs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: constructs/base
            tag: ghcr.io/kleffio/constructs:base
          - context: constructs/java/21
            tag: ghcr.io/kleffio/constructs:java-21
          - context: constructs/java/25
            tag: ghcr.io/kleffio/constructs:java-25
          - context: constructs/java/17
            tag: ghcr.io/kleffio/constructs:java-17
          - context: constructs/steamcmd
            tag: ghcr.io/kleffio/constructs:steamcmd
          - context: constructs/node/20
            tag: ghcr.io/kleffio/constructs:node-20
          - context: constructs/python/3.12
            tag: ghcr.io/kleffio/constructs:python-3.12
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
